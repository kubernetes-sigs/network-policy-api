version: "2"

run:
  timeout: 10m
  issues-exit-code: 1
  tests: true
  modules-download-mode: readonly
  allow-parallel-runners: false

linters:
  default: none
  enable:
    - copyloopvar
    - govet
    - misspell
    - revive
    - unused

  settings:
    govet:
      enable:
        - shadow
    misspell:
      locale: US

  exclusions:
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - dupl

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes: sigs.k8s.io/network-policy-api
